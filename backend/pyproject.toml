[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "B008",  # FastAPI Depends() in argument defaults is idiomatic
]

[tool.ruff.lint.per-file-ignores]
"app/seed_data.py" = ["E501"]  # data tables read better unwrapped
"tests/conftest.py" = ["E402"]  # env vars must be set before app imports

[tool.pytest.ini_options]
testpaths = ["tests"]
